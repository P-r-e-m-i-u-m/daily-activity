name: Daily Merge

on:
  schedule:
    - cron: '0 10 * * *'
  workflow_dispatch:

jobs:
  daily-merge:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Git
        run: |
          git config user.email "amanbaba9404522@gmail.com"
          git config user.name "P-r-e-m-i-u-m"

      - name: Create branch and commit
        run: |
          BRANCH="daily-update-$(date +%Y%m%d)"
          git checkout -b $BRANCH
          echo "Update: $(date)" >> log.txt
          cat >> README.md << 'EOF'

          ### Update
          - Fixed minor bug
          - Code cleanup
          - Improved performance
          EOF
          git add .
          git commit -m "fix: daily improvements $(date +%Y-%m-%d)"
          git push origin $BRANCH

      - name: Create and merge PR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BRANCH="daily-update-$(date +%Y%m%d)"
          gh pr create --title "Daily fix $(date +%Y-%m-%d)" \
                       --body "Daily code improvements and cleanup" \
                       --base main \
                       --head $BRANCH
          gh pr merge --merge --delete-branch
