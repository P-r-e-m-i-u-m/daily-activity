                '    require("../../config/redis").get.mockResolvedValue(null);' \
                '    const result = await cache.get("key");' \
                '    expect(result).toBeNull();' \
                '    expect(cache.misses).toBe(1);' \
                '  });' \
                '' \
                '  test("should return parsed value on hit", async () => {' \
