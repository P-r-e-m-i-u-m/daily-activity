                '      await redis.pexpire(key, windowMs);' \
                '      res.setHeader("X-RateLimit-Limit", max);' \
                '      res.setHeader("X-RateLimit-Remaining", max - count - 1);' \
                '      next();' \
                '    } catch (err) {' \
