name: Setup Milestone and Project Board

on:
  workflow_dispatch:

jobs:
  setup:
    runs-on: ubuntu-latest
    steps:
      - name: Create milestone and assign issues
        env:
          GH_TOKEN: ${{ secrets.MY_TOKEN }}
          REPO: ${{ github.repository }}
        run: |

          # Create milestone v1.5.0
          MILESTONE=$(gh api repos/$REPO/milestones \
            --method POST \
            --field title="v1.5.0" \
            --field description="Sprint 1 — Core API hardening, security fixes, and performance improvements" \
            --field due_on="$(date -d '+30 days' +%Y-%m-%dT00:00:00Z)" \
            --jq '.number' 2>/dev/null || true)

          echo "Created milestone #$MILESTONE"

          # Get milestone number if already exists
          MILESTONE=$(gh api repos/$REPO/milestones --jq '.[] | select(.title=="v1.5.0") | .number' 2>/dev/null || echo "1")
            MILESTONE=$(gh api repos/$REPO/milestones --jq '.[] | select(.title=="v1.5.0") | .number')
          fi

          # Assign first 20 issues to milestone
          for i in $(seq 1 20); do
            gh api repos/$REPO/issues/$i \
              --method PATCH \
              --field milestone=$MILESTONE 2>/dev/null || true
            echo "Assigned issue #$i to milestone v1.5.0"
            sleep 0.5
          done

          echo "Milestone v1.5.0 setup complete with 20 issues!"

      - name: Create project board
        env:
          GH_TOKEN: ${{ secrets.MY_TOKEN }}
          REPO: ${{ github.repository }}
        run: |

          # Get repo owner and name
          OWNER=$(echo $REPO | cut -d'/' -f1)
          REPO_NAME=$(echo $REPO | cut -d'/' -f2)

          # Create project board using GitHub Projects v2
          PROJECT=$(gh api graphql -f query='
            mutation {
              createProjectV2(input: {
                ownerId: "'$(gh api user --jq '.node_id')'"
                title: "NodeFlow API — v1.5.0 Sprint"
              }) {
                projectV2 {
                  id
                  number
                  url
                }
              }
            }' --jq '.data.createProjectV2.projectV2')

          PROJECT_ID=$(echo $PROJECT | jq -r '.id')
          PROJECT_URL=$(echo $PROJECT | jq -r '.url')

          echo "Created project board: $PROJECT_URL"

          # Add custom fields - Status
          gh api graphql -f query='
            mutation {
              createProjectV2Field(input: {
                projectId: "'$PROJECT_ID'"
                dataType: SINGLE_SELECT
                name: "Status"
                singleSelectOptions: [
                  {name: "Backlog", color: GRAY, description: "Not started yet"},
                  {name: "In Progress", color: YELLOW, description: "Currently being worked on"},
                  {name: "In Review", color: BLUE, description: "PR open, awaiting review"},
                  {name: "Done", color: GREEN, description: "Merged and closed"}
                ]
              }) {
                projectV2Field { id }
              }
            }' 2>/dev/null || true

          echo "Project board setup complete!"
          echo "Visit: $PROJECT_URL"
