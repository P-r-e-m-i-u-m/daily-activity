name: Create GitHub Issues

on:
  workflow_dispatch:

jobs:
  create-issues:
    runs-on: ubuntu-latest
    steps:
      - name: Create labels first
        env:
          GH_TOKEN: ${{ secrets.MY_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          gh label create "bug" --color "d73a4a" --description "Something isnt working" --repo $REPO 2>/dev/null || true
          gh label create "enhancement" --color "a2eeef" --description "New feature or request" --repo $REPO 2>/dev/null || true

      - name: Create issues
        env:
          GH_TOKEN: ${{ secrets.MY_TOKEN }}
          REPO: ${{ github.repository }}
        run: |

          gh issue create --repo $REPO --label "bug" \
            --title "Memory leak causing server RAM to climb ~40MB/hr under normal load" \
            --body "$(printf '%s\n' \
              '## Problem' \
              'Noticed our staging server RAM usage climbs from ~280MB to ~1.1GB over roughly 18 hours before we have to restart the process. After profiling with node --inspect and Chrome DevTools heap snapshots, it looks like EventEmitter listeners are being added on every incoming request but never cleaned up.' \
              '' \
              '## Steps to Reproduce' \
              '1. Run the server locally with NODE_ENV=production' \
              '2. Hit any authenticated endpoint in a loop: wrk -t4 -c50 -d60s' \
              '3. Take heap snapshot before and after' \
              '4. Filter by Detached in snapshot — hundreds of detached EventEmitter nodes visible' \
              '' \
              '## Root Cause (suspected)' \
              'In src/services/eventHandler.js we attach a data listener inside the request handler but never call removeListener or use once(). Each request leaks one listener.' \
              '' \
              '## Expected' \
              'Memory should stay flat under sustained load. Listeners must be removed in a finally block or switch to emitter.once() where appropriate.' \
              '' \
              '## Environment' \
              '- Node.js v18.17.0' \
              '- express 4.18.2' \
              '- Ubuntu 22.04 / 2 vCPU / 4GB RAM' \
              '- Observed in staging, reproduced locally')"

          gh issue create --repo $REPO --label "bug" \
            --title "JWT tokens remain valid after logout — no invalidation mechanism" \
            --body "$(printf '%s\n' \
              '## Problem' \
              'Users who log out can still make authenticated API requests using their old token until it naturally expires (currently 7d). This is a serious security gap — if a token is stolen after logout, attacker has up to 7 days of access.' \
              '' \
              '## Steps to Reproduce' \
              '1. POST /api/auth/login — capture the JWT' \
              '2. POST /api/auth/logout' \
              '3. Use the captured JWT on GET /api/users/me' \
              '4. Returns 200 OK — should be 401 Unauthorized' \
              '' \
              '## Expected Behavior' \
              'Token should be rejected immediately after logout. Standard approach: store token JTI in Redis blacklist with TTL matching token expiry.' \
              '' \
              '## Proposed Fix' \
              '- Add jti claim when signing tokens' \
              '- On logout, store jti in Redis with SETEX using remaining TTL' \
              '- In auth middleware, check Redis blacklist before accepting token' \
              '' \
              '## Impact' \
              'High — affects all users. Any stolen session token post-logout is indefinitely valid.')"

          gh issue create --repo $REPO --label "enhancement" \
            --title "Offset pagination on /api/users breaks and slows down past page 50" \
            --body "$(printf '%s\n' \
              '## Problem' \
              'We use standard LIMIT/OFFSET pagination on the users endpoint. Two issues as the table grows:' \
              '' \
              '1. Performance: At OFFSET 5000, Postgres scans 5000 rows just to skip them. EXPLAIN ANALYZE shows Seq Scan cost climbing linearly.' \
              '2. Correctness: If a new user is inserted between page fetches, pages shift — users get duplicated or skipped on client.' \
              '' \
              '## Current Behavior' \
              'GET /api/users?page=3&limit=20 uses OFFSET 40 internally' \
              '' \
              '## Expected Behavior' \
              'GET /api/users?cursor=eyJpZCI6MTIzfQ&limit=20 uses WHERE id > 123 LIMIT 20' \
              '' \
              '## Implementation Notes' \
              '- Cursor should be base64-encoded JSON with last seen id and created_at' \
              '- Index on (id, created_at) already exists — will be fast' \
              '- Response should include next_cursor: null when no more pages' \
              '' \
              '## References' \
              '- https://use-the-index-luke.com/no-offset' \
              '- Discussed in team Slack last Thursday in backend channel')"

          gh issue create --repo $REPO --label "bug" \
            --title "CORS allowing all origins in staging — must match production config" \
            --body "$(printf '%s\n' \
              '## Problem' \
              'Staging API returns Access-Control-Allow-Origin: * for all requests. Any website can make credentialed requests to staging, which has real anonymized data.' \
              '' \
              '## How It Was Found' \
              'Junior dev testing a side project accidentally hit our staging /api/products from localhost:3001 and it worked — that should have been blocked.' \
              '' \
              '## Current Staging Config' \
              'origin: true  (allows everything)' \
              '' \
              '## Production Config' \
              'origin: [https://app.nodeflow.io, https://admin.nodeflow.io]' \
              '' \
              '## Expected' \
              'Staging should use same allowlist as production, with staging domains added. Ensures CORS bugs are caught before reaching prod.' \
              '' \
              '## Fix' \
              'Move CORS config to ALLOWED_ORIGINS env variable — already done in prod, just not wired up in staging deploy pipeline.')"

          gh issue create --repo $REPO --label "enhancement" \
            --title "Add Redis caching to high-traffic endpoints — DB CPU at 90% peak" \
            --body "$(printf '%s\n' \
              '## Problem' \
              'Looking at DB slow query log and Datadog metrics, GET /api/products and GET /api/users/me are called 800-1200 times/min during peak hours. Both hit the DB every single time with no caching.' \
              '' \
              'RDS instance sitting at 85-90% CPU during peak — unsustainable as we scale.' \
              '' \
              '## Proposed Solution' \
              'Add caching layer using existing Redis instance:' \
              '- Cache key pattern: cache:{endpoint}:{userId or queryHash}' \
              '- TTL: 300s for product listings, 60s for user profile' \
              '- Invalidate on write operations (PUT/PATCH/DELETE)' \
              '' \
              '## Expected Impact' \
              'Based on ~75% estimated cache hit rate, should reduce DB queries by ~600/min at peak. Should bring CPU back under 40%.' \
              '' \
              '## Notes' \
              '- Redis already running (used for sessions)' \
              '- Avoid caching responses with PII beyond what is in the session' \
              '- Cache-control headers need updating for CDN layer too')"

          gh issue create --repo $REPO --label "bug" \
            --title "No rate limiting on /api/auth/login — brute force trivially easy" \
            --body "$(printf '%s\n' \
              '## Problem' \
              'Quick test with a Python script hitting POST /api/auth/login in a loop made 500 attempts in under 30 seconds with zero throttling, no lockout, no 429.' \
              '' \
              '## Reproduction' \
              'for i in range(500):' \
              '    requests.post("/api/auth/login", json={"email": "user@test.com", "password": f"attempt{i}"})' \
              '' \
              'All 500 returned 200 or 401 with no rate limit headers at all.' \
              '' \
              '## Expected Behavior' \
              'After 5 failed attempts from same IP within 15 minutes:' \
              '- Return 429 Too Many Requests' \
              '- Include Retry-After header' \
              '- Log event for security monitoring' \
              '' \
              '## Proposed Implementation' \
              'Use express-rate-limit with Redis store (rate-limit-redis) so limits work across multiple server instances.' \
              '' \
              '## Severity' \
              'P0 — Critical security issue on any public-facing auth endpoint.')"

          gh issue create --repo $REPO --label "enhancement" \
            --title "Replace console.log with structured JSON logger — logs unparseable in prod" \
            --body "$(printf '%s\n' \
              '## Problem' \
              'Current logging is a mix of console.log, console.error, and an old util/logger.js only used in 3 files. In CloudWatch/Datadog, unstructured logs are nearly impossible to filter or set alerts on.' \
              '' \
              '## Current Output Examples' \
              'Error in auth middleware TypeError: Cannot read property id of undefined' \
              'User logged in: john@example.com' \
              'DB query took 1823ms' \
              '' \
              'None have timestamps, request IDs, severity levels, or service context.' \
              '' \
              '## Expected Log Format' \
              '{"level":"error","msg":"auth middleware failed","requestId":"abc-123","userId":null,"ts":1720000000000}' \
              '' \
              '## Requirements' \
              '- Levels: debug / info / warn / error' \
              '- Always include: ts, level, msg, requestId, service' \
              '- Conditionally include: userId, route, statusCode, durationMs' \
              '- Development: pretty-print with colors' \
              '- Production: JSON only' \
              '' \
              '## Notes' \
              'Extend existing src/services/logger.ts — do not add pino or winston as new dependency.')"

          gh issue create --repo $REPO --label "bug" \
            --title "Full table scan on orders table — query taking 4.2s at current volume" \
            --body "$(printf '%s\n' \
              '## Problem' \
              'DB monitoring alert fired — query taking 4.2 seconds at current volume (~2.1M rows in orders table):' \
              '' \
              'SELECT * FROM orders WHERE user_id = $1 ORDER BY created_at DESC LIMIT 20;' \
              '' \
              '## EXPLAIN ANALYZE Output' \
              'Seq Scan on orders (cost=0.00..58432.00 rows=2100000) (actual time=0.08..4187.23 rows=20 loops=1)' \
              '' \
              '## Root Cause' \
              'No index on (user_id, created_at). Postgres doing full sequential scan then sorting.' \
              '' \
              '## Fix' \
              'CREATE INDEX CONCURRENTLY idx_orders_user_created ON orders(user_id, created_at DESC);' \
              'Use CONCURRENTLY to avoid locking the table in production.' \
              '' \
              '## Expected After Fix' \
              'Index Scan using idx_orders_user_created — sub 10ms response' \
              '' \
              '## Also Audit' \
              'Same pattern likely in transactions and audit_logs tables.')"

          gh issue create --repo $REPO --label "enhancement" \
            --title "No /health endpoint — ALB marking healthy instances as dead" \
            --body "$(printf '%s\n' \
              '## Problem' \
              'AWS ALB health check is on GET / which returns full app HTML (~300ms). Twice this week ALB marked a healthy instance as unhealthy because app was slow responding during a DB migration.' \
              '' \
              '## Required Behavior' \
              'Dedicated /health endpoint that:' \
              '1. Responds in under 50ms' \
              '2. Checks actual dependencies (DB connection, Redis ping)' \
              '3. Returns structured JSON for per-dependency monitoring' \
              '' \
              '## Expected Response — Healthy' \
              '{"status":"ok","db":"ok","redis":"ok","uptime":38291,"version":"1.4.0"}' \
              '' \
              '## Expected Response — Degraded' \
              '{"status":"degraded","db":"unreachable","redis":"ok"}  → HTTP 503' \
              '' \
              '## Notes' \
              '- Endpoint must NOT require authentication' \
              '- Should be excluded from request logging (too noisy)' \
              '- Kubernetes readiness probe can use this once we migrate')"

          gh issue create --repo $REPO --label "bug" \
            --title "Payment API calls fail hard on 5xx — losing ~15 transactions per week" \
            --body "$(printf '%s\n' \
              '## Problem' \
              'Stripe and internal payment processor integrations use a single fetch() with no retry. When payment API returns 503/504 (~0.3% of requests), we immediately return failure to user and log as failed transaction.' \
              '' \
              'This causes roughly 15-20 false failed transactions per week. Users retry manually and sometimes get double charged.' \
              '' \
              '## Expected Behavior' \
              'On 5xx or network timeout:' \
              '- Retry up to 3 times with exponential backoff (1s, 2s, 4s)' \
              '- On final failure, queue for manual review — do not hard fail' \
              '- Log each retry attempt with attempt number and delay' \
              '' \
              '## Implementation' \
              'src/utils/fetchWithRetry.js already exists but is not wired into payment service. Just needs to be imported and used.' \
              '' \
              '## Impact' \
              'Medium-High — directly causes false payment failures and potential double charges for users.')"
