# Incident Report: INC-${INC_NUM}
## ${SEVERITY}: ${SERVICE} Degradation — ${DURATION} Outage

**Date:** $DATE
**Duration:** ${DURATION}
**Severity:** ${SEVERITY}
**Status:** Resolved
**Author:** P-r-e-m-i-u-m
**Last Updated:** $DATE

---

## Executive Summary

On $DATE, the ${SERVICE} experienced a ${DURATION} degradation affecting production traffic. The incident was detected via automated alerting and resolved by the on-call engineer. This document describes the timeline, root cause, impact and prevention measures.

## Impact

$(case $IDX in
  0) printf '%s\n' "- **Users affected:** ~2,400 authenticated requests failed" "- **Error rate:** Peaked at 34% on /auth/* endpoints" "- **Revenue impact:** Minimal — unauthenticated endpoints unaffected" "- **SLA impact:** Breached 99.9% monthly SLA by 0.03%";;
  1) printf '%s\n' "- **Jobs affected:** 1,847 queued jobs delayed by 47+ minutes" "- **Data loss:** 0 — all jobs persisted in Redis" "- **Revenue impact:** Moderate — delayed email and payment confirmation jobs" "- **SLA impact:** Breached 99.5% weekly SLA";;
  2) printf '%s\n' "- **Cache miss rate:** 100% during incident (normally 6%)" "- **DB load increase:** 8x normal query volume" "- **Latency impact:** p99 increased from 45ms to 380ms" "- **Users affected:** All users experienced degraded response times";;
  3) printf '%s\n' "- **Requests blocked incorrectly:** ~890 legitimate requests returned 429" "- **Users affected:** ~340 unique IPs incorrectly rate limited" "- **Revenue impact:** Low — short duration" "- **Support tickets:** 12 tickets received during incident";;
  4) printf '%s\n' "- **Load balancer impact:** 3 of 5 instances marked unhealthy" "- **Traffic impact:** 60% of traffic routed to 2 remaining instances" "- **Latency impact:** p99 increased from 45ms to 210ms under concentrated load" "- **Duration until auto-recovery:** 19 minutes";;
  5) printf '%s\n' "- **Endpoints affected:** All paginated list endpoints" "- **Duplicate rate:** 8% of pagination responses contained duplicates" "- **Users affected:** ~1,200 API consumers" "- **Data integrity:** No data corruption — display issue only";;
  6) printf '%s\n' "- **Log loss:** ~4,200 log entries not written to file" "- **Observability impact:** 27 minutes of reduced visibility in production" "- **Debugging impact:** Post-incident analysis required additional time" "- **User impact:** None directly — internal observability only";;
esac)

## Timeline (All times UTC)

$(case $IDX in
  0) printf '%s\n' "| Time | Event |" "|-|-|" "| 09:00 | Scheduled deployment of auth middleware refactor to production |" "| 09:03 | Automated alerts fire: auth error rate >5% |" "| 09:04 | On-call engineer paged via PagerDuty |" "| 09:07 | Engineer begins investigation — checks error logs |" "| 09:11 | Root cause identified: Redis SET NX race condition under high concurrency |" "| 09:14 | Rollback initiated to previous auth middleware version |" "| 09:18 | Rollback complete — error rate returns to baseline |" "| 09:23 | Incident declared resolved — monitoring continues |" "| 09:45 | All-clear confirmed — no recurrence |";;
  1) printf '%s\n' "| Time | Event |" "|-|-|" "| 10:00 | Queue processor memory usage alert fires (>80% heap) |" "| 10:04 | On-call engineer investigates — heap snapshot taken |" "| 10:12 | Root cause identified: setTimeout closures retaining job objects |" "| 10:18 | Temporary mitigation: queue processor restarted |" "| 10:23 | Jobs begin processing — backlog of 1,847 jobs |" "| 10:35 | Permanent fix developed: extracted closure to named function |" "| 10:47 | Fixed version deployed to production |" "| 10:47 | Incident resolved — memory usage stable |";;
