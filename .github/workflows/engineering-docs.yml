# ADR-${ADR_NUM}: $(case $((WEEK % 8)) in
  0) echo "Use Redis as Primary Cache Layer Instead of Memcached";;
  1) echo "Adopt Cursor-Based Pagination Over Offset Pagination";;
  2) echo "Use JWT with Redis Blacklist Instead of Opaque Tokens";;
  3) echo "Implement Circuit Breaker Pattern for External API Calls";;
  4) echo "Use PostgreSQL JSONB for Flexible Metadata Storage";;
  5) echo "Adopt Sliding Window Rate Limiting Over Fixed Window";;
  6) echo "Use Structured JSON Logging Over Plain Text Logs";;
  7) echo "Implement Dead Letter Queue for Failed Job Handling";;
esac)

**Status:** Accepted
**Date:** $DATE
**Author:** P-r-e-m-i-u-m
**Reviewers:** Engineering Team

---

## Context

$(case $((WEEK % 8)) in
  0) echo "Our application requires a high-performance caching layer to reduce database load. We evaluated multiple in-memory caching solutions after observing that 70% of our database queries were repetitive reads that could be served from cache. At peak load (1000 req/s), our PostgreSQL instance was hitting 80% CPU utilization.";;
  1) echo "Our list endpoints were using offset-based pagination which caused significant performance degradation as dataset size grew. At 500k records, page 100 queries took 4.2 seconds due to full table scans. User-facing latency was becoming unacceptable and complaints were increasing.";;
  2) echo "Our initial authentication system used opaque tokens stored in PostgreSQL. Every authenticated request required a database lookup to validate the token, adding 15-40ms latency per request. At scale this became a significant bottleneck accounting for 30% of total request time.";;
  3) echo "Our service integrates with 4 external APIs (payment, email, SMS, analytics). When any of these APIs degraded, our service would also degrade as requests piled up waiting for timeouts. A 2-minute payment API outage caused a 15-minute degradation of our entire checkout flow.";;
  4) echo "Different user types in our system require different sets of attributes. Using fixed schema columns required frequent migrations and caused sparse rows. We needed a flexible storage solution that could handle per-user-type metadata without sacrificing query performance.";;
  5) echo "Our fixed-window rate limiter was vulnerable to boundary exploitation where clients could double their allowed request rate by timing requests at window boundaries. Security audit identified this as a medium severity vulnerability requiring immediate attention.";;
  6) echo "Debugging production issues was taking 3-4x longer than necessary because log entries were unstructured plain text. Correlating logs across services required manual grep patterns and was error-prone. We needed machine-parseable logs for our log aggregation pipeline.";;
  7) echo "Failed jobs in our queue were being silently dropped when retry attempts were exhausted. This caused data loss in critical workflows including payment processing and email delivery. We had no visibility into permanently failed jobs or ability to replay them.";;
esac)

## Decision

$(case $((WEEK % 8)) in
  0) echo "We will use **Redis 7.x** as our primary caching layer with a two-level cache strategy: an in-process LRU cache for the hottest data backed by Redis for distributed caching across instances.";;
  1) echo "We will implement **cursor-based pagination** using a composite cursor (id + created_at) encoded as base64. Offset pagination will be deprecated and removed in v2.0.";;
  2) echo "We will use **JWT tokens** (1h expiry) with a Redis blacklist for invalidation. On logout or security events, tokens are added to the blacklist with TTL matching remaining token lifetime.";;
  3) echo "We will implement the **Circuit Breaker pattern** for all external API calls. The breaker opens after 5 consecutive failures and attempts recovery after 60 seconds in half-open state.";;
  4) echo "We will use **PostgreSQL JSONB columns** for user metadata with GIN indexes for efficient querying. Fixed schema columns will be retained for fields used in WHERE clauses and joins.";;
  5) echo "We will replace the fixed-window limiter with a **sliding window algorithm** using Redis sorted sets (ZADD/ZREMRANGEBYSCORE). This eliminates boundary exploitation and provides accurate per-IP rate limiting.";;
  6) echo "We will adopt **structured JSON logging** with a custom Logger class supporting log levels, context inheritance, child loggers for request tracing, and file/console transports.";;
  7) echo "We will implement a **Dead Letter Queue (DLQ)** using a separate Redis list. Jobs are moved to DLQ after 3 retry attempts with exponential backoff. DLQ entries include full error context for debugging and manual replay.";;
esac)

## Alternatives Considered

$(case $((WEEK % 8)) in
  0) printf '%s\n' "| Option | Pros | Cons | Decision |" "|-|-|-|-|" "| **Redis** | Rich data types, pub/sub, persistence, clustering | Slightly more complex setup | ✅ Chosen |" "| Memcached | Simple, fast, low memory overhead | No persistence, limited data types, no pub/sub | ❌ Rejected |" "| In-process only | Zero network overhead | Not shared across instances, lost on restart | ❌ Rejected |" "| DynamoDB DAX | Fully managed | AWS lock-in, high cost, 10ms minimum latency | ❌ Rejected |";;
  1) printf '%s\n' "| Option | Pros | Cons | Decision |" "|-|-|-|-|" "| **Cursor pagination** | O(1) performance, stable results | Cannot jump to arbitrary page | ✅ Chosen |" "| Offset pagination | Simple, supports page jumping | O(n) degradation, page drift on writes | ❌ Rejected |" "| Keyset pagination | Good performance | Complex multi-column sort | ❌ Considered for v2 |";;
  2) printf '%s\n' "| Option | Pros | Cons | Decision |" "|-|-|-|-|" "| **JWT + Redis blacklist** | Stateless verification, fast invalidation | Blacklist storage overhead | ✅ Chosen |" "| Opaque tokens + DB | Simple invalidation | DB lookup per request, latency | ❌ Rejected |" "| JWT short expiry only | No storage needed | Cannot invalidate before expiry | ❌ Rejected |";;
  3) printf '%s\n' "| Option | Pros | Cons | Decision |" "|-|-|-|-|" "| **Circuit Breaker** | Fast failure, auto-recovery | Implementation complexity | ✅ Chosen |" "| Timeout only | Simple | Slow failure, thread exhaustion | ❌ Rejected |" "| Retry only | Handles transient failures | Amplifies load during outages | ❌ Rejected |";;
  4) printf '%s\n' "| Option | Pros | Cons | Decision |" "|-|-|-|-|" "| **PostgreSQL JSONB** | Flexible, queryable, GIN indexes | Slightly more complex queries | ✅ Chosen |" "| Separate metadata table | Clean schema | N+1 query risk, join overhead | ❌ Rejected |" "| MongoDB | Native document storage | Operational complexity, separate infra | ❌ Rejected |";;
  5) printf '%s\n' "| Option | Pros | Cons | Decision |" "|-|-|-|-|" "| **Sliding window** | Accurate, no boundary exploit | Slightly more Redis operations | ✅ Chosen |" "| Fixed window | Simple | Boundary exploitation vulnerability | ❌ Rejected |" "| Token bucket | Smooth rate limiting | Complex Redis implementation | ❌ Considered |";;
  6) printf '%s\n' "| Option | Pros | Cons | Decision |" "|-|-|-|-|" "| **Custom JSON logger** | Full control, no dependencies | More code to maintain | ✅ Chosen |" "| Winston | Mature, feature-rich | Heavy dependency, configuration complexity | ❌ Rejected |" "| Pino | Very fast | Less flexible transport configuration | ❌ Considered |";;
  7) printf '%s\n' "| Option | Pros | Cons | Decision |" "|-|-|-|-|" "| **Redis DLQ** | Simple, uses existing infra | Manual replay required | ✅ Chosen |" "| Silent drop | No storage overhead | Data loss, no visibility | ❌ Rejected |" "| External DLQ service | Managed replay | Additional cost and dependency | ❌ Rejected |";;
esac)

