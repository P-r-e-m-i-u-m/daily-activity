## Motivation

$(case $IDX in
  0) printf '%s\n' "Current pain points with REST:" "- Mobile clients over-fetch data (receiving 40+ fields when needing 5)" "- Multiple round trips needed to assemble complex views" "- No built-in way to express data requirements — documentation constantly out of date" "- Adding new fields requires client-server coordination and versioning";;
  1) printf '%s\n' "Current pain points with direct calls:" "- Tight coupling between modules makes independent scaling impossible" "- No audit trail for state changes" "- Adding a new consumer requires modifying the producer" "- Cannot replay events for debugging or data recovery";;
  2) printf '%s\n' "Current pain points with single-region:" "- All users in Asia/Pacific experience 180-250ms baseline latency" "- Single region is a single point of failure" "- No DR (disaster recovery) capability" "- Compliance requirements in EU require data residency";;
  3) printf '%s\n' "Current pain points with custom auth:" "- Cannot support third-party integrations without sharing credentials" "- No SSO capability — users need separate accounts per service" "- Scope-based authorization requires custom implementation" "- Security audit recommended standards-based auth";;
  4) printf '%s\n' "Current pain points with JavaScript:" "- Runtime type errors account for 34% of production bug reports" "- Refactoring is high-risk without type safety" "- IDE support limited — no autocomplete on complex objects" "- Onboarding new engineers takes 2x longer due to implicit types";;
  5) printf '%s\n' "Current pain points with no versioning:" "- Breaking changes require coordinating all API consumers simultaneously" "- Cannot iterate quickly on API design" "- No formal deprecation process — changes cause unexpected breakage" "- Enterprise customers require API stability guarantees";;
  6) printf '%s\n' "Current pain points with no tracing:" "- Root cause analysis during incidents requires manual log correlation" "- Cannot measure latency contribution of individual components" "- No visibility into which external API calls are slowest" "- Debugging distributed failures takes 3-4x longer than necessary";;
esac)

## Detailed Design

$(case $IDX in
