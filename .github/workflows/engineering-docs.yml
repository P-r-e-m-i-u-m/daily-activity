esac)

## Root Cause Analysis

$(case $IDX in
  0) printf '%s\n' "The auth middleware used Redis SET without the NX flag, creating a race condition where concurrent requests could overwrite each other's cached tokens mid-verification. Under normal load this was not observable, but at >500 concurrent requests the race condition manifested causing ~3% of validations to fail." "" "**Why it was not caught in testing:** Load tests were run at 100 concurrent users. The race condition required 500+ concurrent requests to manifest reliably.";;
  1) printf '%s\n' "The queue processor's retry logic used setTimeout with inline arrow functions that closed over the full job object. Each retry callback retained a reference to the job in memory until the timer fired. Under sustained load with many retries, thousands of job objects accumulated in heap memory." "" "**Why it was not caught in testing:** Memory profiling was not part of the CI pipeline. The leak required 6+ hours of sustained load to become critical.";;
  2) printf '%s\n' "The infrastructure team restarted the Redis instance for routine maintenance without coordinating with the application team. No cache warming procedure existed. The application had no graceful degradation for cold cache scenarios — all traffic fell through to the database simultaneously." "" "**Why it was not caught:** No runbook existed for Redis maintenance. Communication between infra and app teams was informal.";;
  3) printf '%s\n' "A bug in the sliding window implementation set the Redis key TTL in seconds instead of milliseconds, causing keys to expire 1000x faster than intended. This meant the sliding window effectively became a 0.9ms window, blocking nearly all requests as previous entries never expired within the window." "" "**Why it was not caught:** Unit tests mocked Redis and did not test actual TTL behavior. Integration tests did not cover the boundary condition.";;
  4) printf '%s\n' "The health check endpoint called db.query() directly instead of acquiring a connection from the pool and releasing it. With the load balancer polling every 5 seconds across 5 instances, 1 connection per poll was opened and never returned to pool. After 2 hours the pool of 10 connections was exhausted." "" "**Why it was not caught:** Health check was added without code review. No integration test verified connection pool behavior under sustained polling.";;
  5) printf '%s\n' "A type mismatch was introduced when the cursor field was changed from integer ID to string UUID. The cursor comparison used strict equality (===) which failed for numeric strings, causing the query to restart from the beginning and return previously seen items." "" "**Why it was not caught:** Pagination tests used integer IDs. UUID-based pagination was not covered in the test suite.";;
  6) printf '%s\n' "The logger was designed for environments with writable filesystems. When deployed to Kubernetes with a read-only root filesystem (a security hardening measure), all fs.appendFileSync calls threw EROFS errors that were caught by a bare catch block and silently discarded." "" "**Why it was not caught:** Deployment environment used writable filesystem in staging. Read-only filesystem was only enforced in production Kubernetes.";;
esac)

## Resolution

$(case $IDX in
  0) echo "Rolled back to previous auth middleware version immediately. Developed fix using Redis SET with NX flag (set-if-not-exists) to eliminate race condition. Fix deployed to production after load testing at 2000 concurrent users with 0 failures.";;
  1) echo "Restarted queue processor to release accumulated memory. Developed fix extracting setTimeout callback to named function and adding timer.unref() to prevent event loop retention. Deployed and monitored over 48h — memory growth under 1MB/hour.";;
  2) echo "Executed manual cache warming script to pre-populate Redis with most-accessed data. Developed automated cache warming procedure to run on Redis startup. Added Redis maintenance runbook requiring app team sign-off before restarts.";;
  3) echo "Identified and flushed incorrectly-configured Redis keys. Deployed hotfix correcting TTL unit from seconds to milliseconds. Added integration test verifying actual Redis TTL behavior with real Redis instance in test environment.";;
  4) echo "Deployed hotfix using db.pool.connect() with client.release() in finally block. Added connection pool monitoring alert. Added integration test verifying connection count remains stable under 1000 health check polls.";;
  5) echo "Deployed hotfix using composite base64 cursor encoding both id and created_at with type-safe comparison. Added UUID-based pagination to test suite. Added regression test specifically covering type mismatch scenarios.";;
  6) echo "Deployed hotfix catching EROFS and EACCES errors and falling back to stdout-only mode. Added Kubernetes deployment test environment with read-only filesystem. Added log volume monitoring alert for early detection.";;
esac)

