name: Engineering Docs

on:
  schedule:
    - cron: '0 13 * * *'
  workflow_dispatch:

jobs:
  engineering-docs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.MY_TOKEN }}

      - name: Setup Git
        run: |
          git config user.email "amanbaba9404522@gmail.com"
          git config user.name "P-r-e-m-i-u-m"

      - name: Generate Engineering Docs
        run: |
          DATE=$(date +%Y-%m-%d)
          DAY=$(( ($(date +%j) % 5) + 1 ))
          TS=$(date +%s)
          WEEK=$(date +%V)
          WEEK_NUM=$((10#$WEEK))

          mkdir -p docs/adr docs/incidents docs/rfc docs/security docs/architecture

          case $DAY in
            1)
              ADR_NUM=$(printf '%04d' $WEEK_NUM)
              ADR_IDX=$((WEEK_NUM % 8))

              case $ADR_IDX in
                0) ADR_TITLE="Use Redis as Primary Cache Layer Instead of Memcached"
                   ADR_CONTEXT="Our application requires a high-performance caching layer to reduce database load. We evaluated multiple in-memory caching solutions after observing that 70% of our database queries were repetitive reads. At peak load (1000 req/s), our PostgreSQL instance was hitting 80% CPU utilization."
                   ADR_DECISION="We will use Redis 7.x as our primary caching layer with a two-level cache strategy: in-process LRU cache for hottest data backed by Redis for distributed caching across instances."
                   ADR_POSITIVE="Database CPU reduced from 80% to 22% at peak load. p99 latency on cached endpoints: 1.2ms (was 45ms). Cache hit ratio: 94% after warm-up period."
                   ADR_NEGATIVE="Redis becomes a critical dependency and requires HA setup in production." ;;
                1) ADR_TITLE="Adopt Cursor-Based Pagination Over Offset Pagination"
                   ADR_CONTEXT="Our list endpoints were using offset-based pagination which caused significant performance degradation as dataset size grew. At 500k records, page 100 queries took 4.2 seconds due to full table scans."
                   ADR_DECISION="We will implement cursor-based pagination using a composite cursor (id + created_at) encoded as base64. Offset pagination will be deprecated and removed in v2.0."
                   ADR_POSITIVE="List endpoint p99 latency: constant 12ms regardless of dataset size. Eliminated page drift on high-write collections."
                   ADR_NEGATIVE="Cannot support arbitrary page jumping — linked list navigation only." ;;
                2) ADR_TITLE="Use JWT with Redis Blacklist Instead of Opaque Tokens"
                   ADR_CONTEXT="Our initial authentication system used opaque tokens stored in PostgreSQL. Every authenticated request required a database lookup to validate the token, adding 15-40ms latency per request."
                   ADR_DECISION="We will use JWT tokens (1h expiry) with a Redis blacklist for invalidation. On logout, tokens are added to the blacklist with TTL matching remaining token lifetime."
                   ADR_POSITIVE="Auth overhead reduced from 15-40ms to 1-3ms. Immediate token invalidation on logout without waiting for expiry."
                   ADR_NEGATIVE="Redis blacklist must be replicated across all instances." ;;
                3) ADR_TITLE="Implement Circuit Breaker Pattern for External API Calls"
                   ADR_CONTEXT="Our service integrates with 4 external APIs. When any of these APIs degraded, our service would also degrade as requests piled up waiting for timeouts. A 2-minute payment API outage caused a 15-minute degradation of our entire checkout flow."
                   ADR_DECISION="We will implement the Circuit Breaker pattern for all external API calls. The breaker opens after 5 consecutive failures and attempts recovery after 60 seconds in half-open state."
                   ADR_POSITIVE="External API failures no longer cascade to our service. Checkout flow remains available during payment API degradation."
                   ADR_NEGATIVE="Circuit breaker state must be monitored and alerted on OPEN state." ;;
                4) ADR_TITLE="Use PostgreSQL JSONB for Flexible Metadata Storage"
                   ADR_CONTEXT="Different user types in our system require different sets of attributes. Using fixed schema columns required frequent migrations and caused sparse rows."
                   ADR_DECISION="We will use PostgreSQL JSONB columns for user metadata with GIN indexes for efficient querying. Fixed schema columns will be retained for fields used in WHERE clauses."
                   ADR_POSITIVE="Zero schema migrations needed for new user type attributes. GIN indexes provide sub-10ms JSONB queries even at scale."
                   ADR_NEGATIVE="JSONB columns cannot be used in foreign key constraints." ;;
                5) ADR_TITLE="Adopt Sliding Window Rate Limiting Over Fixed Window"
                   ADR_CONTEXT="Our fixed-window rate limiter was vulnerable to boundary exploitation where clients could double their allowed request rate by timing requests at window boundaries. Security audit identified this as a medium severity vulnerability."
                   ADR_DECISION="We will replace the fixed-window limiter with a sliding window algorithm using Redis sorted sets (ZADD/ZREMRANGEBYSCORE). This eliminates boundary exploitation."
                   ADR_POSITIVE="Rate limit boundary exploitation completely eliminated. More accurate per-IP counting across the full sliding window."
                   ADR_NEGATIVE="Slightly higher Redis memory usage due to sorted set per IP." ;;
                6) ADR_TITLE="Use Structured JSON Logging Over Plain Text Logs"
                   ADR_CONTEXT="Debugging production issues was taking 3-4x longer than necessary because log entries were unstructured plain text. Correlating logs across services required manual grep patterns and was error-prone."
                   ADR_DECISION="We will adopt structured JSON logging with a custom Logger class supporting log levels, context inheritance, child loggers for request tracing, and file/console transports."
                   ADR_POSITIVE="Production debugging time reduced by 70%. Log aggregation pipeline now fully automated. Request tracing across services via X-Request-ID correlation."
                   ADR_NEGATIVE="Log files require rotation policy to prevent disk exhaustion." ;;
                7) ADR_TITLE="Implement Dead Letter Queue for Failed Job Handling"
                   ADR_CONTEXT="Failed jobs in our queue were being silently dropped when retry attempts were exhausted. This caused data loss in critical workflows including payment processing and email delivery."
                   ADR_DECISION="We will implement a Dead Letter Queue (DLQ) using a separate Redis list. Jobs are moved to DLQ after 3 retry attempts with exponential backoff."
                   ADR_POSITIVE="Zero data loss on permanently failed jobs. Full error context preserved for debugging and replay."
                   ADR_NEGATIVE="DLQ requires monitoring and operational runbook for replay procedures." ;;
              esac

              printf '%s\n' \
                "# ADR-${ADR_NUM}: ${ADR_TITLE}" \
                '' \
                '**Status:** Accepted' \
                "**Date:** $DATE" \
                '**Author:** P-r-e-m-i-u-m' \
                '**Reviewers:** Engineering Team' \
                '' \
                '---' \
                '' \
                '## Context' \
                '' \
                "$ADR_CONTEXT" \
                '' \
                '## Decision' \
                '' \
                "$ADR_DECISION" \
                '' \
                '## Alternatives Considered' \
                '' \
                '| Option | Pros | Cons | Decision |' \
                '|-|-|-|-|' \
                '| Chosen approach | Best fit for requirements | Some tradeoffs | Accepted |' \
                '| Alternative A | Simpler | Missing key features | Rejected |' \
                '| Alternative B | More features | Too complex / costly | Rejected |' \
                '' \
                '## Consequences' \
                '' \
                '### Positive' \
                "$ADR_POSITIVE" \
                '' \
                '### Negative' \
                "$ADR_NEGATIVE" \
                '' \
                '## References' \
                "- [Implementation PR](https://github.com/P-r-e-m-i-u-m/daily-activity/pulls)" \
                "- [Related Issues](https://github.com/P-r-e-m-i-u-m/daily-activity/issues)" > docs/adr/ADR-${ADR_NUM}-$(date +%Y%m%d).md

              git add docs/adr/
              git commit -m "docs: add ADR-${ADR_NUM} architectural decision record - $DATE" ;;

            2)
              INC_NUM=$(printf '%04d' $WEEK_NUM)
              IDX=$((WEEK_NUM % 7))

              case $IDX in
                0) SERVICE="Auth Service"; DURATION="23 minutes"; SEVERITY="SEV-2"
                   INC_SUMMARY="JWT token validation intermittently failed under high concurrency due to a Redis SET race condition. Approximately 2,400 authenticated requests returned 401 during the incident window."
                   INC_ROOTCAUSE="The auth middleware used Redis SET without the NX flag, creating a race condition where concurrent requests could overwrite cached tokens mid-verification. The race condition required 500+ concurrent requests to manifest."
                   INC_RESOLUTION="Rolled back to previous auth middleware version immediately. Developed fix using Redis SET with NX flag. Fix deployed after load testing at 2000 concurrent users with 0 failures."
                   T1="09:00"; E1="Scheduled deployment of auth middleware refactor"
                   T2="09:03"; E2="Automated alerts fire: auth error rate over 5 percent"
                   T3="09:11"; E3="Root cause identified: Redis SET NX race condition"
                   T4="09:14"; E4="Rollback initiated to previous version"
                   T5="09:23"; E5="Incident resolved — error rate back to baseline" ;;
                1) SERVICE="Queue Processor"; DURATION="47 minutes"; SEVERITY="SEV-1"
                   INC_SUMMARY="Queue processor memory usage grew unbounded causing OOM restart. 1,847 jobs were delayed. No data loss due to Redis persistence."
                   INC_ROOTCAUSE="setTimeout callbacks in retry logic closed over full job objects. Under sustained load with many retries, thousands of job objects accumulated in heap memory. The leak required 6+ hours of sustained load to become critical."
                   INC_RESOLUTION="Restarted queue processor to release accumulated memory. Developed fix extracting setTimeout callback to named function with timer.unref(). Deployed and monitored over 48h — memory growth under 1MB/hour."
                   T1="10:00"; E1="Queue processor memory usage alert fires (over 80 percent heap)"
                   T2="10:12"; E2="Root cause identified: setTimeout closures retaining job objects"
                   T3="10:18"; E3="Temporary mitigation: queue processor restarted"
                   T4="10:35"; E4="Permanent fix developed and deployed"
                   T5="10:47"; E5="Incident resolved — memory usage stable" ;;
                2) SERVICE="Cache Layer"; DURATION="12 minutes"; SEVERITY="SEV-3"
                   INC_SUMMARY="Redis restart by infrastructure team caused 100% cache miss rate. DB load increased 8x. All users experienced degraded response times."
                   INC_ROOTCAUSE="Infrastructure team restarted Redis for routine maintenance without coordinating with the application team. No cache warming procedure existed. All traffic fell through to the database simultaneously."
                   INC_RESOLUTION="Executed manual cache warming script. Developed automated cache warming procedure to run on Redis startup. Added Redis maintenance runbook requiring app team sign-off."
                   T1="14:00"; E1="Redis instance restarted by infrastructure team"
                   T2="14:01"; E2="Cache miss rate spikes to 100 percent — all requests hit DB"
                   T3="14:04"; E3="On-call engineer identifies Redis restart as root cause"
                   T4="14:06"; E4="Cache warming script executed manually"
                   T5="14:12"; E5="Cache hit rate above 80 percent — incident resolved" ;;
                3) SERVICE="Rate Limiter"; DURATION="38 minutes"; SEVERITY="SEV-2"
                   INC_SUMMARY="Rate limiter TTL misconfiguration caused 890 legitimate requests to be incorrectly blocked with 429 errors. 340 unique IPs were affected."
                   INC_ROOTCAUSE="A bug in the sliding window implementation set the Redis key TTL in seconds instead of milliseconds, causing keys to expire 1000x faster than intended."
                   INC_RESOLUTION="Identified and flushed incorrectly-configured Redis keys. Deployed hotfix correcting TTL unit. Added integration test verifying actual Redis TTL behavior."
                   T1="11:00"; E1="Rate limiter TTL misconfiguration deployed"
                   T2="11:08"; E2="Alert fires: 429 error rate above 2 percent"
                   T3="11:12"; E3="Engineer identifies TTL bug in sliding window"
                   T4="11:22"; E4="Hotfix deployed — incorrect keys flushed"
                   T5="11:38"; E5="Error rate returns to baseline — incident resolved" ;;
                4) SERVICE="Health Check"; DURATION="19 minutes"; SEVERITY="SEV-3"
                   INC_SUMMARY="Health check endpoint caused DB connection pool exhaustion. 3 of 5 load balancer instances were marked unhealthy, concentrating traffic on 2 remaining instances."
                   INC_ROOTCAUSE="Health check endpoint called db.query() directly instead of acquiring a pooled connection. With the load balancer polling every 5 seconds, 1 connection per poll was opened and never returned to the pool."
                   INC_RESOLUTION="Deployed hotfix using db.pool.connect() with client.release() in finally block. Added connection pool monitoring alert. Added integration test verifying stable connection count under sustained polling."
                   T1="08:00"; E1="Health check endpoint deployed with connection pool bug"
                   T2="08:19"; E2="DB connection pool exhausted — health checks return 503"
                   T3="08:19"; E3="Load balancer marks 3 instances unhealthy"
                   T4="08:24"; E4="On-call engineer identifies connection pool exhaustion"
                   T5="08:31"; E5="Hotfix deployed — instances healthy — incident resolved" ;;
                5) SERVICE="Pagination API"; DURATION="31 minutes"; SEVERITY="SEV-2"
                   INC_SUMMARY="Cursor-based pagination returned duplicate items when cursor field type changed from integer to UUID string. 8% of pagination responses were affected."
                   INC_ROOTCAUSE="A type mismatch was introduced when the cursor field was changed from integer ID to string UUID. The cursor comparison used strict equality which failed for numeric strings."
                   INC_RESOLUTION="Deployed hotfix using composite base64 cursor encoding both id and created_at with type-safe comparison. Added UUID-based pagination to test suite."
                   T1="16:00"; E1="Pagination cursor type changed from int to string in deployment"
                   T2="16:04"; E2="First reports of duplicate items from API consumers"
                   T3="16:09"; E3="Engineer identifies cursor comparison bug"
                   T4="16:18"; E4="Hotfix deployed: composite cursor with type-safe comparison"
                   T5="16:31"; E5="All pagination responses confirmed duplicate-free" ;;
                6) SERVICE="Logger Service"; DURATION="27 minutes"; SEVERITY="SEV-3"
                   INC_SUMMARY="Logger failed silently in Kubernetes with read-only filesystem. Approximately 4,200 log entries were lost. No direct user impact but observability was reduced."
                   INC_ROOTCAUSE="Logger used fs.appendFileSync which threw EROFS errors on read-only filesystem. Errors were caught by a bare catch block and silently discarded."
                   INC_RESOLUTION="Deployed hotfix catching EROFS and EACCES errors and falling back to stdout-only mode. Added Kubernetes test environment with read-only filesystem."
                   T1="07:00"; E1="Service deployed to Kubernetes with read-only filesystem"
                   T2="07:04"; E2="Monitoring alert: reduced log volume detected"
                   T3="07:11"; E3="Engineer identifies read-only filesystem as root cause"
                   T4="07:18"; E4="Hotfix deployed: logger falls back to stdout on EROFS"
                   T5="07:27"; E5="Full log volume restored — incident resolved" ;;
              esac

              printf '%s\n' \
                "# Incident Report: INC-${INC_NUM}" \
                "## ${SEVERITY}: ${SERVICE} Degradation — ${DURATION} Outage" \
                '' \
                "**Date:** $DATE" \
                "**Duration:** ${DURATION}" \
                "**Severity:** ${SEVERITY}" \
                '**Status:** Resolved' \
                '**Author:** P-r-e-m-i-u-m' \
                "**Last Updated:** $DATE" \
                '' \
                '---' \
                '' \
                '## Executive Summary' \
                '' \
                "$INC_SUMMARY" \
                '' \
                '## Timeline (All times UTC)' \
                '' \
                '| Time | Event |' \
                '|-|-|' \
                "| $T1 | $E1 |" \
                "| $T2 | $E2 |" \
                "| $T3 | $E3 |" \
                "| $T4 | $E4 |" \
                "| $T5 | $E5 |" \
                '' \
                '## Root Cause Analysis' \
                '' \
                "$INC_ROOTCAUSE" \
                '' \
                '## Resolution' \
                '' \
                "$INC_RESOLUTION" \
                '' \
                '## Prevention Measures' \
                '' \
                '| Action | Owner | Status |' \
                '|-|-|-|' \
                "| Add regression test to CI | P-r-e-m-i-u-m | Done |" \
                "| Update runbook | P-r-e-m-i-u-m | Done |" \
                "| Add monitoring alert | P-r-e-m-i-u-m | Done |" \
                "| Post-mortem review | P-r-e-m-i-u-m | Completed |" \
                '' \
                '## Lessons Learned' \
                '' \
                '1. Load testing thresholds must reflect production concurrency levels' \
                '2. All infrastructure maintenance must follow the change management runbook' \
                '3. Integration tests must use real dependencies not just mocks' \
                '4. Security hardening changes must be reflected in staging environment' \
                '' \
                '---' \
                '*This incident report was reviewed and approved by the engineering team.*' > docs/incidents/INC-${INC_NUM}-$(date +%Y%m%d).md

              git add docs/incidents/
              git commit -m "docs: add incident report INC-${INC_NUM} post-mortem - $DATE" ;;

            3)
              RFC_NUM=$(printf '%04d' $WEEK_NUM)
              IDX=$((WEEK_NUM % 7))

              case $IDX in
                0) RFC_TITLE="Migrate from REST to GraphQL for Client-Facing APIs"
                   RFC_SUMMARY="This RFC proposes migrating our client-facing REST APIs to GraphQL to reduce over-fetching, eliminate N+1 query problems on the client side, and provide a self-documenting API schema."
                   RFC_MOTIVATION="Mobile clients over-fetch data (receiving 40+ fields when needing 5). Multiple round trips needed to assemble complex views. No built-in way to express data requirements."
                   RFC_DESIGN="Phase 1: Schema Design (Week 1-2). Phase 2: Resolver Implementation with DataLoader (Week 3-4). Phase 3: Parallel running alongside REST (Week 5-8). Phase 4: REST deprecation with 6-month notice (Week 9-12)."
                   RFC_ALTERNATIVES="REST with sparse fieldsets: partial solution. gRPC: better performance but poor browser support. tRPC: excellent DX but couples client and server." ;;
                1) RFC_TITLE="Adopt Event-Driven Architecture with Redis Streams"
                   RFC_SUMMARY="This RFC proposes introducing Redis Streams as an event bus for decoupling service components, enabling better scalability, replay capability and audit logging."
                   RFC_MOTIVATION="Tight coupling between modules makes independent scaling impossible. No audit trail for state changes. Adding a new consumer requires modifying the producer."
                   RFC_DESIGN="Define event schema with eventId, eventType, aggregateId, payload and metadata. Stream naming: user-events, order-events, audit-events. Each service subscribes as a named consumer group."
                   RFC_ALTERNATIVES="RabbitMQ: more mature but additional infrastructure. Kafka: better throughput but significant operational overhead. Direct callbacks: simple but tight coupling remains." ;;
                2) RFC_TITLE="Implement Multi-Region Deployment Strategy"
                   RFC_SUMMARY="This RFC proposes a multi-region deployment strategy across 3 geographic regions to reduce latency for international users and provide disaster recovery with automatic failover."
                   RFC_MOTIVATION="All users in Asia/Pacific experience 180-250ms baseline latency. Single region is a single point of failure. No DR capability. EU compliance requires data residency."
                   RFC_DESIGN="Target regions: ap-south-1 (primary), us-east-1 (secondary), eu-west-1 (tertiary). PostgreSQL: primary with read replicas. Redis: independent cluster per region. RTO: 5 minutes, RPO: 30 seconds."
                   RFC_ALTERNATIVES="CDN only: reduces static latency but not API latency. Single region better hardware: vertical scaling has limits. Cloudflare Workers: limited to stateless workloads." ;;
                3) RFC_TITLE="Replace Custom Auth with OAuth 2.0 and OpenID Connect"
                   RFC_SUMMARY="This RFC proposes replacing our custom JWT authentication system with a standards-compliant OAuth 2.0 and OpenID Connect implementation to support third-party integrations and SSO."
                   RFC_MOTIVATION="Cannot support third-party integrations without sharing credentials. No SSO capability. Security audit recommended standards-based auth."
                   RFC_DESIGN="Grant types: Authorization Code + PKCE, Client Credentials, Refresh Token. Scopes: read/write profile and orders, admin:users restricted. Existing JWT sessions valid for 30 days during migration."
                   RFC_ALTERNATIVES="Auth0/Okta: fully managed but vendor lock-in and high cost. Keycloak: open source but significant operational overhead. Passport.js: library not a full standards implementation." ;;
                4) RFC_TITLE="Adopt TypeScript Across the Entire Codebase"
                   RFC_SUMMARY="This RFC proposes migrating the entire codebase from JavaScript to TypeScript to eliminate runtime type errors, improve IDE support, and enable safer refactoring."
                   RFC_MOTIVATION="Runtime type errors account for 34% of production bug reports. Refactoring is high-risk without type safety. Onboarding new engineers takes 2x longer due to implicit types."
                   RFC_DESIGN="Incremental migration using ts-migrate. Strict mode: noImplicitAny, strictNullChecks, noUnusedLocals. Timeline: utils/config (Week 1-2), middleware/services (Week 3-4), routes/tests (Week 5-6), enforce TS-only (Week 7-8)."
                   RFC_ALTERNATIVES="JSDoc types: lower effort but inferior tooling. Flow: less ecosystem adoption. Stay with JavaScript: status quo is causing measurable quality issues." ;;
                5) RFC_TITLE="Implement API Versioning Strategy"
                   RFC_SUMMARY="This RFC proposes a formal API versioning strategy using URL path versioning with a defined deprecation policy to allow breaking changes without disrupting existing API consumers."
                   RFC_MOTIVATION="Breaking changes require coordinating all API consumers simultaneously. No formal deprecation process. Enterprise customers require API stability guarantees."
                   RFC_DESIGN="URL structure: /v1/users/:id, /v2/users/:id. Deprecation policy: minimum 6 months notice. Deprecated versions return Sunset header. Maximum 2 active major versions at any time."
                   RFC_ALTERNATIVES="Header versioning: cleaner URLs but harder to test in browser. Query param versioning: simple but pollutes query string. No versioning: requires all changes to be additive only." ;;
                6) RFC_TITLE="Add Distributed Tracing with OpenTelemetry"
                   RFC_SUMMARY="This RFC proposes implementing distributed tracing using OpenTelemetry to gain end-to-end visibility into request flows across all service components."
                   RFC_MOTIVATION="Root cause analysis during incidents requires manual log correlation. Cannot measure latency contribution of individual components. Debugging distributed failures takes 3-4x longer than necessary."
                   RFC_DESIGN="Auto-instrument HTTP, PostgreSQL, Redis and fetch. Export pipeline: OpenTelemetry Collector to Jaeger (dev) and Datadog APM (prod). Custom spans for business logic critical paths."
                   RFC_ALTERNATIVES="Custom correlation IDs only: already implemented but insufficient. Datadog APM proprietary SDK: vendor lock-in. AWS X-Ray: AWS-specific not portable." ;;
              esac

              printf '%s\n' \
                "# RFC-${RFC_NUM}: ${RFC_TITLE}" \
                '' \
                '**Status:** Draft - Under Review' \
                '**Author:** P-r-e-m-i-u-m' \
                "**Created:** $DATE" \
                "**Last Updated:** $DATE" \
                '**Target Version:** v2.0.0' \
                '' \
                '---' \
                '' \
                '## Summary' \
                '' \
                "$RFC_SUMMARY" \
                '' \
                '## Motivation' \
                '' \
                "$RFC_MOTIVATION" \
                '' \
                '## Detailed Design' \
                '' \
                "$RFC_DESIGN" \
                '' \
                '## Alternatives Considered' \
                '' \
                "$RFC_ALTERNATIVES" \
                '' \
                '## Implementation Plan' \
                '' \
                '| Phase | Description | Status |' \
                '|-|-|-|' \
                '| RFC Draft | Write and circulate this document | Done |' \
                '| RFC Review | Gather feedback from stakeholders | In Progress |' \
                '| Proof of Concept | Build minimal working implementation | Planned |' \
                '| Decision | Accept, revise or reject RFC | Planned |' \
                '| Implementation | Full implementation if accepted | Planned |' \
                '' \
                '---' \
                '*This RFC is open for comments. Please add feedback via GitHub Issues.*' > docs/rfc/RFC-${RFC_NUM}-$(date +%Y%m%d).md

              git add docs/rfc/
              git commit -m "docs: add RFC-${RFC_NUM} engineering proposal - $DATE" ;;

            4)
              printf '%s\n' \
                '# Module Dependency Graph' \
                "**Generated:** $DATE" \
                "**Version:** $(date +%Y.%m.%d)" \
                '' \
                '## System Overview' \
                '' \
                '```' \
                '                    +------------------------------------------+' \
                '                    |              Express App                 |' \
                '                    |         (src/index.js)                   |' \
                '                    +------------------+-----------------------+' \
                '                                       |' \
                '              +------------------------+------------------------+' \
                '              |                        |                        |' \
                '              v                        v                        v' \
                '    +------------------+    +------------------+    +------------------+' \
                '    |   Middleware     |    |     Routes       |    |    Services      |' \
                '    | auth.js          |    | health.js        |    | logger.js        |' \
                '    | rateLimiter.js   |    | users.js         |    | connManager.js   |' \
                '    | security.js      |    | orders.js        |    +------------------+' \
                '    | requestId.js     |    +------------------+' \
                '    | errorHandler.js  |' \
                '    +------------------+' \
                '              |                        |                        |' \
                '              +------------------------+------------------------+' \
                '                                       |' \
                '              +------------------------+------------------------+' \
                '              |                        |                        |' \
                '              v                        v                        v' \
                '    +------------------+    +------------------+    +------------------+' \
                '    |     Utils        |    |     Cache        |    |     Queue        |' \
                '    | fetchWithRetry   |    | cacheManager.js  |    | processor.js     |' \
                '    | paginate.js      |    | withCache HOF    |    | DLQ support      |' \
                '    | sanitize.js      |    +--------+---------+    +--------+---------+' \
                '    +------------------+             |                        |' \
                '                                     +------------------------+' \
                '                                                |' \
                '              +------------------------+--------+' \
                '              |                        |' \
                '              v                        v' \
                '    +------------------+    +------------------+' \
                '    |   config/        |    |   Database       |' \
                '    | redis.js         |    | connection.js    |' \
                '    | cors.js          |    | migrations/      |' \
                '    | db.js            |    | queries/         |' \
                '    +------------------+    +------------------+' \
                '              |                        |' \
                '              v                        v' \
                '    +------------------+    +------------------+' \
                '    |     Redis        |    |   PostgreSQL     |' \
                '    |   (External)     |    |   (External)     |' \
                '    +------------------+    +------------------+' \
                '```' \
                '' \
                '## Module Dependency Matrix' \
                '' \
                '| Module | Depends On | Used By |' \
                '|-|-|-|' \
                '| auth.js | redis, logger, jwt | requireAuth middleware, all routes |' \
                '| rateLimiter.js | redis, logger | all public routes |' \
                '| security.js | none | Express app |' \
                '| requestId.js | logger | Express app, all routes |' \
                '| errorHandler.js | logger | Express app |' \
                '| cacheManager.js | redis, logger | auth.js, user routes |' \
                '| processor.js | redis, logger | background workers |' \
                '| health.js | db, redis, logger | load balancer |' \
                '| paginate.js | logger | all list routes |' \
                '| sanitize.js | logger | all write routes |' \
                '| fetchWithRetry.js | logger | external API calls |' \
                '| logger.js | fs, path | everything |' \
                '' \
                '## Circular Dependency Check' \
                '' \
                '```' \
                'No circular dependencies detected' \
                'All modules follow single-direction dependency flow' \
                'External dependencies (Redis, PostgreSQL) only at config layer' \
                '```' \
                '' \
                '## Dependency Health' \
                '' \
                '| Dependency | Version | Vulnerabilities | Status |' \
                '|-|-|-|-|' \
                '| express | 4.19.2 | 0 | Current |' \
                '| jsonwebtoken | 9.0.0 | 0 | Current |' \
                '| redis | 4.6.14 | 0 | Current |' \
                '| axios | 1.7.2 | 0 | Current |' \
                '| dotenv | 16.4.5 | 0 | Current |' \
