$(case $((WEEK % 8)) in
  0) printf '%s\n' "- Database CPU reduced from 80% to 22% at peak load" "- p99 latency on cached endpoints: 1.2ms (was 45ms)" "- Cache hit ratio: 94% after warm-up period" "- Horizontal scaling now possible without DB bottleneck";;
  1) printf '%s\n' "- List endpoint p99 latency: constant 12ms regardless of dataset size" "- Eliminated page drift on high-write collections" "- Reduced DB load by removing COUNT queries from every page request";;
