## Alternatives Considered

$(case $IDX in
  0) printf '%s\n' "- **REST with sparse fieldsets** — Partial solution, does not solve N+1 or schema documentation" "- **gRPC** — Better performance but requires protobuf, poor browser support" "- **tRPC** — Excellent TypeScript DX but couples client and server codebases";;
  1) printf '%s\n' "- **RabbitMQ** — More mature but additional infrastructure to operate" "- **Kafka** — Better for high throughput but significant operational overhead" "- **Direct event callbacks** — Simple but tight coupling remains";;
  2) printf '%s\n' "- **CDN only** — Reduces static asset latency but not API latency" "- **Single region with better hardware** — Vertical scaling has limits, no DR" "- **Cloudflare Workers** — Edge computing but limited to stateless workloads";;
  3) printf '%s\n' "- **Auth0 / Okta** — Fully managed but vendor lock-in and high cost at scale" "- **Keycloak** — Open source but significant operational overhead" "- **Passport.js** — Library not a full standards implementation";;
  4) printf '%s\n' "- **JSDoc types** — Lower effort but inferior tooling and no compile-time checking" "- **Flow** — Less ecosystem adoption, Facebook backing reduced" "- **Stay with JavaScript** — Status quo is causing measurable quality issues";;
  5) printf '%s\n' "- **Header versioning** — Cleaner URLs but harder to test in browser" "- **Query param versioning** — Simple but pollutes query string" "- **No versioning, use expansion** — Requires all changes to be additive only";;
  6) printf '%s\n' "- **Custom correlation IDs only** — Already implemented, insufficient for complex traces" "- **Datadog APM proprietary SDK** — Vendor lock-in, high cost" "- **AWS X-Ray** — Good but AWS-specific, not portable";;
esac)

