name: Daily Auto Commit

on:
  schedule:
    - cron: '0 9 * * *'
  workflow_dispatch:

jobs:
  auto-commit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Make a commit
        run: |
          git config user.email "amanbaba9404522@gmail.com"
          git config user.name "P-r-e-m-i-u-m"
          echo "$(date)" >> activity.log
          git add .
          git commit -m "Daily update: $(date)"
